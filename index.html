<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐚 實境解謎平台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(160deg,#0d4f7a,#1a6fa3,#2a9fd6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:24px;padding:32px 28px;max-width:400px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,0.3);text-align:center}
.title{font-size:22px;font-weight:900;color:#1a3a5c;margin-bottom:6px}
.subtitle{font-size:13px;color:#5a8aaa;margin-bottom:24px}
a.entry{display:block;padding:16px;border-radius:14px;margin-bottom:12px;text-decoration:none;font-weight:700;font-size:15px;transition:transform 0.15s}
a.entry:active{transform:scale(0.97)}
.e-player{background:linear-gradient(90deg,#1a6fa3,#2a9fd6);color:white}
.e-admin{background:#f0f6fa;color:#1a3a5c;border:2px solid #cde7f5}
.e-confirm{background:#fff8e6;color:#7a5a00;border:2px solid #f5c842}
.hint{font-size:11px;color:#999;margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="title">🐚 實境解謎平台</div>
  <div class="subtitle">Real-world Puzzle Platform</div>
  <a class="entry e-player" href="player.html">🎮 玩家闖關入口</a>
  <a class="entry e-admin" href="admin.html">🛠️ 管理後台</a>
  <div class="hint">關主 QR 確認頁（confirm.html）由系統自動產生連結，不需要從這裡進入。</div>
</div>
</body>
</html>
